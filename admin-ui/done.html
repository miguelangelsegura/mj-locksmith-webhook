<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dispango — You're all set</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --line:#262b35; --text:#e8eaed; --muted:#9aa3b2; --accent:#4f7cff; --ok:#3ecf8e; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin:0; min-height:100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #15212b 0%, var(--bg) 55%);
    color:var(--text);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card {
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:40px 32px; max-width:460px; width:100%; text-align:center;
  }
  .check {
    width:64px; height:64px; margin:0 auto 8px; border-radius:999px;
    background:rgba(62,207,142,.14); color:var(--ok);
    display:flex; align-items:center; justify-content:center;
  }
  .check svg { width:34px; height:34px; }
  h1 { font-size:24px; margin:18px 0 6px; }
  p { color:var(--muted); font-size:15px; line-height:1.55; margin:0 auto; max-width:380px; }
  .checks { margin:22px auto 4px; max-width:300px; text-align:left; }
  .checks div { display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text); padding:6px 0; }
  .checks .dot { color:var(--ok); font-weight:700; }
  .next {
    margin-top:24px; padding-top:18px; border-top:1px solid var(--line);
    color:var(--muted); font-size:14px; line-height:1.55;
  }
  .brand { margin-top:26px; color:var(--muted); font-size:12px; letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>You're all set!</h1>
    <p>Thanks — we've got everything we need to get your AI receptionist up and running.</p>
    <div class="checks">
      <div><span class="dot">✓</span> Contract signed</div>
      <div><span class="dot">✓</span> Payment received</div>
    </div>
    <div class="next">
      We're setting up your line right now. We'll be in contact soon — no further action needed on your end.
    </div>
    <div class="brand">DISPANGO</div>
  </div>
</body>
</html>

project_id = "mj-locksmith-webhook"

[functions.vapi-webhook]
verify_jwt = false

[functions.admin]
verify_jwt = false

[functions.billing]
verify_jwt = false

# Public endpoint (external cron / uptime pinger hits it); the HEARTBEAT_TOKEN
# ?token= / x-vapi-secret check inside the function is the auth gate.
[functions.heartbeat-monitor]
verify_jwt = false

# Customer dashboard API. verify_jwt = false because the function validates the
# caller's Supabase JWT itself (auth.getUser) so it can read the user off the token
# and scope every write to that user's own shop row.
[functions.dashboard]
verify_jwt = false

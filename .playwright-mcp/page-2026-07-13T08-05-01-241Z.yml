          - generic [ref=f27e109]:
            - generic [ref=f27e110]:
              - generic [ref=f27e111]:
                - generic [ref=f27e112]: Synopsis
                - generic [ref=f27e113]: 4 Minute Read
              - paragraph [ref=f27e115]: If your shareholders’ agreement has a buy-sell clause, be sure to read this overview of some commonly used pricing mechanisms and the pros and cons of each.
              - link "Read more" [ref=f27e117] [cursor=pointer]:
                - /url: "#"
            - generic [ref=f27e121]:
              - link [ref=f27e123] [cursor=pointer]:
                - /url: /en/personnel/catherine-tremblay
              - generic [ref=f27e125]:
                - link "Catherine Tremblay, CPA, FEEE/FCBV, ASA, CFF" [ref=f27e127] [cursor=pointer]:
                  - /url: /en/personnel/catherine-tremblay
                - generic [ref=f27e128]: Partner, Valuation and Litigation Support
      - generic [ref=f27e130]:
        - generic [ref=f27e132]:
          - generic [ref=f27e133]: Insight
          - button "Insight" [ref=f27e138] [cursor=pointer]
        - generic [ref=f27e140]:
          - paragraph [ref=f27e141]:
            - emphasis [ref=f27e142]: This article was originally created for the Canadian Institute of Chartered Business Valuators
          - paragraph [ref=f27e143]: Just as every apartment needs a fire escape, every shareholders’ agreement needs a buy-sell clause to set a price for the company’s shares on the occurrence of certain triggering events. A buy-sell clause outlines a process and pricing mechanism for the sale of the shares of a departing shareholder (e.g. upon death, disability, retirement, etc.) that necessitates a change in the ownership of a closely-held private company. The purpose of the clause is to provide a pre-determined procedure that ensures a fair price for all shareholders, while ensuring an orderly transfer of control to the remaining owners. Yet, in this author’s experience, these clauses can often create havoc if the pricing provisions are not properly thought out. This article provides an overview of some commonly used pricing mechanisms and discusses the pros and cons of each.
          - heading "Don’t use Book Value!" [level=2] [ref=f27e144]
          - paragraph [ref=f27e145]:
            - text: The pricing mechanism in the buy-sell clause should be designed to ensure that both the buying and selling shareholders will be able to automatically transact at a price that is fair to all parties. One solution commonly adopted is for the shareholders to base the price on the net
            - strong [ref=f27e146]: book value
            - text: "of the company. Net book value is simply the difference between the assets and liabilities reported on a company’s balance sheet at a point in time. The calculation of net book value is typically a straightforward mathematical exercise, but it may not result in a fair price. To understand why, consider the following example:"
          - list [ref=f27e147]:
            - listitem [ref=f27e148]: When ABC Corp. was founded, it issued 100 shares at $1 per share, allocated evenly between two shareholders; the shareholders used bank debt and personal loans to finance all of ABC’s operating assets.
            - listitem [ref=f27e149]: The shareholders’ agreement specifies that the shares are to be transacted at net book value upon a triggering event.
            - listitem [ref=f27e150]: The company becomes highly profitable, earning an average of $100,000 in after-tax profits per year; these are distributed to the shareholders every year, such that the net book value of the company remains $100.
            - listitem [ref=f27e151]: Ten years later, one of the two shareholders has suddenly been involved in a fatal accident. In accordance with the buy-sell clause, her shares must be offered by her estate to the other shareholder for total consideration of $50 ($1x50) based on the net book value.
          - paragraph [ref=f27e152]:
            - text: Because ABC’s balance sheet will present its assets and liabilities based on their historical cost, and not their current fair market value, a pricing mechanism based on book value will tend to significantly understate the value of the shares. The formula disregards the value of intangible assets and goodwill that may have developed within the company, since their historical cost is nil and their fair market value is not recognized on the balance sheet (in accordance with generally accepted accounting principles). It also ignores any appreciation in the value of certain tangible assets, such as real estate.
            - strong
          - heading "Other Methods" [level=2] [ref=f27e153]
          - paragraph [ref=f27e154]: "If book value is not a reliable method, then are there any other simple methods that can be used? Here are three possibilities, along with some caveats:"
          - list [ref=f27e155]:
            - listitem [ref=f27e156]:
              - text: A
              - strong [ref=f27e157]: periodic price-setting strategy
              - text: "involves a meeting between the shareholders to negotiate a price to be used if a triggering event occurs. Used properly, this method can result in a realistic, agreed-upon valuation of the company based on the ground-level view of its owners: because neither owner knows whether she will the buyer or seller, there is a motivation to arrive at a reasonable value. However, there are also pitfalls. If not updated regularly, the price may lose its relevance. Additionally, the method can be time-consuming, may lead to disputes over value opinions, and may lead to unfair prices when one party is more knowledgeable about the business than the other."
            - listitem [ref=f27e158]:
              - text: The
              - strong [ref=f27e159]: formula approach
              - text: arrives at a price using inputs such as the company’s earnings, revenues and assets, and applying multiples or valuation ratios thereto. Formulas are easy to use; however, over time, the company’s circumstances may evolve, and a formula that once made sense may no longer result in a fair price. For example, a company may choose to apply a formula using a multiple of EBITDA (earnings before interest, taxes, depreciation and amortization) to value its business operations. However, the company may, in the future, accumulate a large cash or investment balance. The value of these so-called “redundant assets” (which are assets not required to run the day-to-day business operations) is typically not accounted for in an EBITDA multiple, so the formula would need to specifically address the possible future existence of redundant assets to avoid an understatement of value. Another issue is that the historical EBITDA used in a pricing formula may no longer be representative of current or anticipated future results (for example, if the company wins or loses a major customer). In valuing a company, it is the prospective profitability that investors look to; historical results are relevant only insofar as they are useful predictors of the future.
            - listitem [ref=f27e160]:
              - text: A
              - strong [ref=f27e161]: shotgun arrangement
              - text: "enables shareholders to part ways by allowing them to make an offer to acquire the other shareholdings, at a price set by the offeror. The other shareholder(s) must decide if they will either (i) sell their shares at that price, or (ii) buy the offeror’s shares at the same price. If the offer is set too high, the other shareholder(s) will choose to sell their shares and reap the rewards of an inflated price; if the offer is too low, the offeror will end up having the offer turned around on him by the offeree shareholders and have his shares purchased ‘on the cheap’. In a perfect world in which each party has equal knowledge and funding, the shotgun clause would be a fair solution that meets the objective of ensuring that current shareholders can remain in control of who ‘joins their club’. However, an imbalance of wealth may make the shotgun clause problematic: shareholders with more money than the other owners may use their resources to their advantage. A wealthy shareholder can trigger the shotgun and offer a low price, knowing that the other owners would be unable to afford the purchase of his shares even at the low price, and they would therefore be forced to sell at that price. Another example is where one shareholding is very small relative to the other, for example, 10%-90%: the 10% shareholder may not have the financial resources available to buy out a 90% stake."
          - heading "Fair Market Value" [level=2] [ref=f27e162]
          - paragraph [ref=f27e163]:
            - text: In order to avoid the drawbacks associated with the various approaches outlined above, it may be advisable to hire a third party valuator to determine the
            - strong [ref=f27e164]: fair market value
            - text: of the shares. Fair market value is the amount that an item (such as a company’s shares) would realize in the open market. Fair market value looks at what a company’s assets are actually worth, rather than their historical cost.
          - paragraph [ref=f27e165]: The advantage of a fair market value determination is that it results in an objective and current measure of the shares’ worth, provided by an arms-length professional with expertise in business valuation such as a Chartered Business Valuator (CBV). While there is a cost associated with hiring a professional, it may pale in comparison to the cost of litigation in the event that the parties are unable to arrive at a price that is mutually agreeable and supportable.
          - heading "Conclusion" [level=2] [ref=f27e166]
          - paragraph [ref=f27e167]: When drafting a shareholders’ agreement, it is important that shareholders, their financial advisors and legal counsel give adequate consideration to the buy-sell clause, particularly in relation to the price-setting mechanism. Approaches that may appear easy-to-use and appropriate at a given time may become irrelevant and outdated, resulting in much acrimony and litigation. A proper, arm’s length appraisal by a Chartered Business Valuator may prove to be a sound approach in the long run.
          - paragraph [ref=f27e168]: Make sure you have an adequate fire escape!
          - paragraph [ref=f27e169]:
            - text: To learn more, contact Catherine Tremblay, CPA, CA, CBV, ASA, CFF, National Leader, Valuations, at 514.861.9724 or
            - link "catherine.tremblay@mnp.ca" [ref=f27e170] [cursor=pointer]:
              - /url: mailto:catherine.tremblay@mnp.ca
            - text: .

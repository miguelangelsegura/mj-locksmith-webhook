        - generic [ref=f44e91]:
          - paragraph [ref=f44e92]:
            - emphasis [ref=f44e93]: This article was originally published in the Society of Trust and Estate Practitioners (STEP) Toronto newsletter and is reproduced with permission.
          - paragraph [ref=f44e94]: Formal agreements between shareholders govern the actions of the parties to the agreement. Of significance to trust, estate and tax practitioners are the buy / sell clauses dealing with exit events such as death, disability, retirement, and matrimonial dissolution, among others, and the potential need to protect the interests of family members who are not actively involved in the operations of the business.
          - paragraph [ref=f44e95]: The drafting of shareholder agreements is most commonly the domain of lawyers, who carefully plan for various situations, while capturing the intended objectives of the shareholders. Frequently the value implications for the shareholders, including their family members and other beneficiaries are overlooked or misunderstood, which can lead to unintended outcomes, or disputes. Such outcomes can be avoided, or at least mitigated. In this article, we will provide a business valuator’s perspective on Shareholder Buy / Sell Agreements, with a focus on matters relevant to trust, estate, and tax practitioners.
          - heading "Objectives of a Shareholder Buy/Sell Agreement" [level=2] [ref=f44e96]
          - paragraph [ref=f44e97]: The objective of a Shareholder Buy / Sell Agreement is to provide liquidity to the exiting shareholder and ensure a continuity of operations and a smooth ownership transition for the remaining shareholders. In terms of estate planning, a well-structured clause provides greater certainty regarding the value and liquidity of a deceased’s shares. It also allows the remaining shareholders to continue to operate the business status quo without the involvement of outside parties.
          - heading "Value Terms" [level=2] [ref=f44e98]
          - paragraph [ref=f44e99]: When drafting or interpreting a buy / sell clause, it is important to understand the value term. There are many definitions of value including (but not limited) to fair market value, fair value, book value and value according to a formula. There are advantages and disadvantages with respect to each value term and it is important to understand the implications of the selected term.
          - paragraph [ref=f44e100]: One value term which is frequently referred to is book value. When referencing a business, book value is often defined as total assets minus total liabilities (also known as shareholder’s equity). Book value is also used in the context of a specific asset, in which case it is often defined as the capitalized cost less accumulated amortization. Although book value is often easy to ascertain as it appears on the face of the financial statements, it has significant limitations as a proxy for fair market value. Relying on book value as a value term typically understates the value of a business as it does not credit the business for certain assets generated over the company’s lifetime such as intangible assets (e.g. customer relationships, goodwill, trademarks, patents and other intellectual property). Similarly, it may also ignore contingent liabilities which are often difficult to measure and therefore only included in the notes to the financial statements. Given these limitations, fair market value is often selected as the value term in Shareholder Buy / Sell Agreements.
          - heading "Fair Market Value" [level=2] [ref=f44e101]
          - paragraph [ref=f44e102]: "Fair Market Value (FMV) is defined by the Canadian Institute of Chartered Business Valuators and other international professional appraisal bodies, as follows:"
          - paragraph [ref=f44e103]:
            - emphasis [ref=f44e104]: the highest price, expressed in terms of cash equivalents, at which property would change hands between a hypothetical willing and able buyer and a hypothetical willing and able seller, acting at arms-length in an open and unrestricted market, when neither is under compulsion to buy or sell and when both have reasonable knowledge of the relevant facts.
          - paragraph [ref=f44e105]: "A few aspects of FMV should be noted by those drafting or interpreting Shareholder Buy / Sell Agreements:"
          - list [ref=f44e106]:
            - listitem [ref=f44e107]: The use of FMV provides a value that is expressed in terms of cash equivalents at the effective date, while the actual proceeds to the shareholder may include debt (i.e. a portion of the price to be paid for the shares may be deferred). If the Shareholder Buy / Sell Agreement specifies deferred payments (with or without interest), care should be taken to ensure that the proceeds are equivalent to the FMV.
            - listitem [ref=f44e108]: FMV of individual non-controlling shareholdings are ordinarily subject to discounts for lack of control and/or lack of marketability. The Shareholder Buy / Sell Agreement should be explicit as to whether the FMV of shares on a triggering event should or should not reflect such discounts.
            - listitem [ref=f44e109]: "Special attention should be paid to situations which involve a business controlled by a group of family members who do not deal at arm’s length. Although the Shareholder Buy / Sell Agreement may explicitly prescribe the use of a discount for lack of control, Canada Revenue Agency’s (CRA) view (as set out in Information Circular 89-3: Policy Statement on Business Equity Valuations [IC 89-3]) is that it is a rebuttable presumption that a family group has acted in concert to control a corporation. Unless evidence is provided to the contrary, CRA would employ a rateable value for each family group member’s shares."
            - listitem [ref=f44e110]: FMV is determined at a point in time and should not reflect hindsight information or retrospective evidence.
            - listitem [ref=f44e111]: Other factors which can be addressed in the Shareholder Buy / Sell Agreement include whether the valuation should consider the loss to the business of the exiting shareholder’s future involvement in the business, treatment of contingent items, and treatment of latent taxes on unrealized gains on real estate and other investments, to name a few.
          - heading "Valuation Process" [level=2] [ref=f44e112]
          - paragraph [ref=f44e113]: "In addition to the value term, prescribing certain steps of the valuation process in the Buy / Sell Agreement can be advantageous. Some of the elements that the parties may wish to specify in the Shareholder Buy / Sell Agreement include:"
          - list [ref=f44e114]:
            - listitem [ref=f44e115]: Designating a specific valuator (e.g. the company’s audit firm, a specific business valuation firm) or a process for the parties to select a valuator, depending on the nature of the triggering event;
            - listitem [ref=f44e116]: Stipulating the professional qualifications of the valuator (i.e. that the valuator be a Chartered Business Valuator or hold another comparable appraisal designation); and
            - listitem [ref=f44e117]: The timing of the appointment of the valuator and for the delivery of the valuator’s report.
          - heading "Valuation Mechanisms" [level=2] [ref=f44e118]
          - paragraph [ref=f44e119]: The following paragraphs outline various valuation mechanisms which are often considered in the context of Buy / Sell Agreements. The valuation mechanism is used to determine the value of the subject shares.
          - paragraph [ref=f44e120]: A fixed price mechanism is a price negotiated in advance. The perceived advantages of a fixed price mechanism is that the mechanism is simple (and therefore easy to understand) and inexpensive to implement. The disadvantage is that the fixed price is rarely updated and therefore does not reflect the fair market value of the shares at the time of exit.
          - paragraph [ref=f44e121]: A shotgun clause is a mechanism whereby one party makes an offer and the other party has the option of either accepting the offer or purchasing the shares at the offered price. On the surface, the mechanism appears to be equitable; however, the efficacy of the mechanism depends on whether each party has equal financial backing and is equally informed.
          - paragraph [ref=f44e122]: A right of first refusal clause is a mechanism whereby the remaining shareholder has the first option to buy the shares of the exiting shareholder. Although this mechanism gives the remaining shareholder the first option, the remaining shareholder may not be in a position to purchase the shares of the exiting shareholder.
          - paragraph [ref=f44e123]: A valuation mechanism based on a formula has many perceived advantages. The formula is easy to implement and is perceived to be current at the time of exit given the fact that some of the inputs, such as EBITDA, are calculated at the time of exit. The disadvantage of a formula is that certain components of the formula, such as the valuation multiple, are static. In addition, it is difficult to structure a formula to adequately address all the potential future changes that affect a business’ operations such as growth, profitability, risk profile, competition, industry and general economic conditions.
          - paragraph [ref=f44e124]: A price determined by an independent valuator resolves many of the challenges outlined above. The valuator can incorporate the facts and circumstances in existence at the date of exit as well as management’s best estimate of the future operations of the business in order to arrive at the fair market value of the exiting shareholder’s shares. It should specify that the valuator be independent and accredited.
          - heading "CRA Views on Buy-Sell Agreements" [level=2] [ref=f44e125]
          - paragraph [ref=f44e126]: FMV is a notional concept referred to (although not defined) in the Income Tax Act (the Act). However, FMV, as defined above, is the value term referred to in CRA IC 89-3.
          - paragraph [ref=f44e127]: IC 89-3 provides some guidance regarding the CRA’s views on the role of buy-sell agreements in the determination of fair market value under section 69 and subsection 70(5) of the Act. IC 89-3 notes that the buy-sell value must be based on a reasonable estimate of fair market value and there should be no donative intent in the agreement.
          - paragraph [ref=f44e128]:
            - text: Given the potential that the CRA will assess a value for the shares that varies from value outlined in the Shareholder Buy / Sell Agreement, some Shareholder Buy / Sell Agreements include a clause in which the continuing shareholders will indemnify the deceased shareholder’s estate for the payment of
            - link "additional income" [ref=f44e129] [cursor=pointer]:
              - /url: /en/insights/directory/if-i-earn-extra-income-how-do-i-report-this-on-my-tax-return
            - text: taxes where CRA has assessed a higher FMV than the Shareholder Buy / Sell agreement price.
          - heading "Conclusion" [level=2] [ref=f44e130]
          - paragraph [ref=f44e131]: As illustrated above, there are many points to consider when drafting and interpreting a Buy / Sell Agreement. Although some key points to consider have been outlined, a business valuator should be consulted regarding the valuation aspects of the agreement so that unintended outcomes can be avoided.

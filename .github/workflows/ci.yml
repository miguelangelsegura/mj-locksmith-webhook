name: CI

# Regression guard: every change to a function / the web app is auto-checked so a
# Vapi/model/prompt/webhook tweak can't quietly break the pipeline. Runs on PRs and
# on pushes to main. `--node-modules-dir=none` makes Deno resolve npm:/jsr: deps
# from its own cache instead of expecting an installed node_modules (the repo has a
# root package.json for the web app, which would otherwise flip Deno into that mode).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  functions:
    name: Edge Functions (type-check + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check every function
        run: |
          for f in supabase/functions/*/index.ts; do
            echo "::group::deno check $f"
            deno check --node-modules-dir=none "$f"
            echo "::endgroup::"
          done
      - name: Unit tests
        run: deno test --node-modules-dir=none --allow-env supabase/functions/

  web:
    name: Web (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
